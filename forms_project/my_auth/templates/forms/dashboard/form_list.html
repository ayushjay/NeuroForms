{% extends "forms/base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-6">My Forms</h2>

<div class="space-y-4">
    {% for form in forms %}
    <div class="border p-4 rounded shadow-sm">
        <h3 class="text-lg font-semibold">{{ form.title }}</h3>
        <p class="text-gray-600">{{ form.description }}</p>

        <div class="mt-3 flex gap-4">
            <a href="{% url 'edit_form' form.id %}" class="text-blue-600 underline">
                Edit
            </a>

            <a href="{% url 'render_form' form.id %}" class="text-green-600 underline">
                View Public
            </a>

            <a href="{% url 'results_view' form.id %}" class="text-purple-600 underline">
                Results
            </a>
        </div>
    </div>
    {% empty %}
    <p>No forms created yet.</p>
    {% endfor %}
</div>

{% endblock %}
